[supervisord]
nodaemon=true
user=root

[program:X]
command=/usr/bin/Xorg :0 -config /etc/X11/xorg.conf -noreset
autostart=true
autorestart=true
stdout_logfile=/var/log/xorg.log
stderr_logfile=/var/log/xorg.err

[program:squid]
command=/usr/sbin/squid -N
autostart=true
autorestart=true

[program:xrdp-sesman]
command=/usr/sbin/xrdp-sesman
autostart=true
autorestart=true
stderr_logfile=/var/log/xrdp-sesman.err.log
stdout_logfile=/var/log/xrdp-sesman.out.log

[program:xrdp]
command=/usr/sbin/xrdp -nodaemon
autostart=true
autorestart=true
